<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>TagiTopia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap');

  :root {
    --bg: #0a0a0f; --panel: #12121a; --border: #2a2a3a;
    --accent: #ff3b3b; --accent2: #ff8c00; --safe: #00e5ff;
    --text: #e8e8f0; --muted: #888899; --glow: 0 0 20px rgba(255,59,59,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; overflow: hidden; height: 100vh; touch-action: none; }
  #canvas-container { position: fixed; inset: 0; z-index: 0; }
  canvas { display: block; }

  /* SCREENS */
  .screen { position: fixed; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center; background: rgba(10,10,15,0.92); backdrop-filter: blur(8px); transition: opacity 0.4s; overflow-y: auto; }
  .screen.hidden { opacity: 0; pointer-events: none; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 26px 30px; width: 480px; max-width: 95vw; max-height: 95vh; overflow-y: auto; box-shadow: 0 0 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05); }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 68px; letter-spacing: 4px; line-height: 1; text-align: center; background: linear-gradient(135deg, #ff3b3b, #ff8c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
  .tagline { text-align: center; color: var(--muted); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 22px; }
  label { display: block; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  input[type=text] { width: 100%; padding: 11px 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; margin-bottom: 16px; }
  input[type=text]:focus { border-color: var(--accent); }
  input[type=text]::placeholder { color: var(--muted); }
  .color-grid { display: flex; gap: 9px; flex-wrap: wrap; margin-bottom: 18px; }
  .color-swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; }
  .color-swatch.selected { border-color: white; transform: scale(1.2); box-shadow: 0 0 12px rgba(255,255,255,0.4); }
  .tabs { display: flex; gap: 3px; margin-bottom: 18px; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 4px; flex-wrap: wrap; }
  .tab { flex: 1; min-width: 55px; padding: 8px 3px; border: none; background: none; color: var(--muted); font-family: 'Barlow', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; border-radius: 7px; transition: all 0.2s; }
  .tab.active { background: var(--accent); color: white; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, #ff3b3b, #cc1a1a); color: white; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--glow); }
  .btn-secondary { background: rgba(255,255,255,0.07); color: var(--text); border: 1px solid var(--border); margin-top: 8px; }
  .btn-secondary:hover { background: rgba(255,255,255,0.12); }
  .btn-sm { width: auto; padding: 8px 14px; font-size: 13px; border-radius: 7px; font-family: 'Barlow', sans-serif; font-weight: 700; margin: 0; }
  .lobby-list { max-height: 170px; overflow-y: auto; margin-bottom: 10px; }
  .lobby-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; background: rgba(255,255,255,0.03); cursor: pointer; transition: all 0.15s; }
  .lobby-item:hover { border-color: var(--accent); background: rgba(255,59,59,0.08); }
  .lobby-item-name { font-weight: 600; font-size: 13px; }
  .lobby-item-info { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-waiting { background: rgba(0,229,255,0.15); color: var(--safe); }
  .badge-playing { background: rgba(255,59,59,0.15); color: var(--accent); }
  .badge-private { background: rgba(228,183,0,0.15); color: #ffd600; }
  .empty-state { text-align: center; padding: 22px; color: var(--muted); font-size: 13px; }

  /* HUD */
  #hud { position: fixed; z-index: 20; inset: 0; pointer-events: none; }
  #hud-status { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); background: rgba(10,10,15,0.85); border: 1px solid var(--border); border-radius: 12px; padding: 8px 20px; text-align: center; backdrop-filter: blur(8px); }
  #hud-status.it { border-color: var(--accent); box-shadow: var(--glow); }
  #hud-status.safe { border-color: var(--safe); box-shadow: 0 0 20px rgba(0,229,255,0.3); }
  #status-label { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 3px; }
  #status-sub { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  #player-list { position: absolute; top: 14px; right: 14px; background: rgba(10,10,15,0.8); border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; min-width: 130px; backdrop-filter: blur(8px); }
  #player-list-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
  .pl-entry { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; font-size: 12px; }
  .pl-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .pl-name { flex: 1; }
  .pl-it { font-size: 10px; color: var(--accent); font-weight: 700; }
  #controls-hint { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); background: rgba(10,10,15,0.75); border: 1px solid var(--border); border-radius: 10px; padding: 6px 16px; font-size: 11px; color: var(--muted); backdrop-filter: blur(8px); text-align: center; white-space: nowrap; }
  @media (max-width:600px) { #controls-hint { display: none; } #player-list { min-width: 110px; right: 8px; top: 8px; } }

  #tag-flash { position: fixed; inset: 0; z-index: 100; pointer-events: none; background: rgba(255,59,59,0.35); opacity: 0; transition: opacity 0.1s; }
  #lobby-waiting { position: fixed; z-index: 50; bottom: 14px; left: 50%; transform: translateX(-50%); background: rgba(10,10,15,0.9); border: 1px solid var(--safe); border-radius: 12px; padding: 9px 22px; text-align: center; backdrop-filter: blur(8px); font-size: 13px; box-shadow: 0 0 20px rgba(0,229,255,0.2); display: none; }
  #lobby-waiting.visible { display: block; }
  #leave-btn { position: fixed; top: 14px; left: 14px; z-index: 30; pointer-events: all; display: none; }
  .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(255,59,59,0.9); color: white; padding: 8px 20px; border-radius: 30px; font-size: 13px; font-weight: 600; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* MOBILE CONTROLS */
  #mobile-controls { position: fixed; bottom: 0; left: 0; right: 0; z-index: 25; display: none; pointer-events: none; padding: 0 18px 22px; justify-content: space-between; align-items: flex-end; }
  #mobile-controls.visible { display: flex; }
  #joystick-zone { width: 124px; height: 124px; position: relative; pointer-events: all; }
  #joystick-base { width: 124px; height: 124px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.14); position: absolute; top: 0; left: 0; }
  #joystick-thumb { width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.22); border: 2px solid rgba(255,255,255,0.45); position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); backdrop-filter: blur(4px); transition: background 0.1s; }
  #joystick-thumb.active { background: rgba(255,59,59,0.45); border-color: var(--accent); }
  #right-buttons { display: flex; flex-direction: column; gap: 11px; align-items: flex-end; pointer-events: all; }
  .action-btn { width: 62px; height: 62px; border-radius: 50%; border: none; cursor: pointer; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(6px); transition: all 0.1s; user-select: none; -webkit-user-select: none; pointer-events: all; position: relative; }
  #btn-jump { background: rgba(0,229,255,0.18); border: 2px solid rgba(0,229,255,0.45); color: var(--safe); font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 1px; }
  #btn-jump:active { background: rgba(0,229,255,0.45); transform: scale(0.9); }
  #btn-chat-mobile { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); color: white; font-size: 22px; }
  #btn-chat-mobile:active { background: rgba(255,255,255,0.25); transform: scale(0.9); }
  .chat-unread-dot { position: absolute; top: -3px; right: -3px; background: var(--accent); color: white; border-radius: 50%; width: 17px; height: 17px; font-size: 10px; font-weight: 700; display: none; align-items: center; justify-content: center; }
  .chat-unread-dot.show { display: flex; }

  /* CHAT */
  #chat-panel { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 380px; max-width: 98vw; z-index: 40; background: rgba(10,10,15,0.94); border: 1px solid var(--border); border-bottom: none; border-radius: 16px 16px 0 0; backdrop-filter: blur(14px); display: flex; flex-direction: column; transition: transform 0.3s ease; pointer-events: all; max-height: 350px; }
  #chat-panel.closed { transform: translateX(-50%) translateY(calc(100% - 42px)); }
  #chat-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; cursor: pointer; user-select: none; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #chat-header-left { display: flex; align-items: center; gap: 7px; font-weight: 700; font-size: 12px; letter-spacing: 1px; }
  #chat-unread-badge { background: var(--accent); color: white; border-radius: 10px; padding: 1px 7px; font-size: 10px; font-weight: 700; display: none; }
  #chat-unread-badge.show { display: inline-block; }
  #chat-toggle-arrow { font-size: 12px; color: var(--muted); transition: transform 0.3s; }
  #chat-panel.closed #chat-toggle-arrow { transform: rotate(180deg); }
  #chat-messages { flex: 1; overflow-y: auto; padding: 8px 13px; display: flex; flex-direction: column; gap: 4px; min-height: 0; }
  .chat-msg { display: flex; gap: 6px; align-items: flex-start; animation: chatSlide 0.2s ease; }
  @keyframes chatSlide { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .chat-msg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .chat-msg-body { flex: 1; font-size: 12px; line-height: 1.4; }
  .chat-msg-name { font-weight: 700; margin-right: 4px; }
  .chat-msg-text { color: var(--text); }
  .chat-msg-time { font-size: 10px; color: var(--muted); margin-left: 3px; }
  .chat-msg.system .chat-msg-body { color: var(--muted); font-style: italic; font-size: 11px; }
  #chat-input-row { display: flex; gap: 7px; padding: 9px 11px; border-top: 1px solid var(--border); flex-shrink: 0; }
  #chat-input { flex: 1; padding: 8px 12px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; }
  #chat-input:focus { border-color: var(--accent); }
  #chat-input::placeholder { color: var(--muted); }
  #chat-send { padding: 8px 14px; background: var(--accent); border: none; border-radius: 8px; color: white; font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 1px; cursor: pointer; transition: all 0.15s; }
  #chat-send:hover { background: #cc1a1a; }
  #chat-key-hint { position: fixed; bottom: 42px; left: 50%; transform: translateX(-50%); background: rgba(10,10,15,0.65); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 10px; color: var(--muted); z-index: 35; pointer-events: none; letter-spacing: 1px; display: none; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div id="canvas-container"></div>
<div id="tag-flash"></div>

<!-- MENU -->
<div class="screen" id="screen-menu">
  <div class="panel">
    <div class="logo">TAG!</div>
    <div class="tagline">3D Multiplayer Madness</div>
    <label>Your Name</label>
    <input type="text" id="input-name" placeholder="Enter your name..." maxlength="16"/>
    <label>Pick Color</label>
    <div class="color-grid" id="color-grid"></div>
    <div class="tabs">
      <button class="tab active" data-tab="create">Create</button>
      <button class="tab" data-tab="browse">Browse</button>
      <button class="tab" data-tab="join">Join</button>
      <button class="tab" data-tab="private">🔒 Private</button>
    </div>
    <div class="tab-content active" id="tab-create">
      <label>Lobby Name</label>
      <input type="text" id="input-lobby-name" placeholder="My Lobby..." maxlength="24"/>
      <button class="btn btn-primary" id="btn-create">CREATE LOBBY</button>
    </div>
    <div class="tab-content" id="tab-browse">
      <div class="lobby-list" id="lobby-list"><div class="empty-state">Loading...</div></div>
      <button class="btn btn-secondary" id="btn-refresh">↻ Refresh</button>
    </div>
    <div class="tab-content" id="tab-join">
      <label>Lobby Code</label>
      <input type="text" id="input-lobby-code" placeholder="ABC123" maxlength="6" style="text-transform:uppercase"/>
      <button class="btn btn-primary" id="btn-join-code">JOIN LOBBY</button>
    </div>
    <div class="tab-content" id="tab-private">
      <div style="display:flex;gap:7px;margin-bottom:14px;">
        <button class="priv-mode-btn active" data-mode="create" style="flex:1;padding:9px;border:1px solid var(--border);border-radius:8px;background:rgba(255,59,59,0.15);color:var(--accent);font-family:Barlow,sans-serif;font-weight:700;font-size:11px;cursor:pointer;letter-spacing:1px;">CREATE PRIVATE</button>
        <button class="priv-mode-btn" data-mode="join" style="flex:1;padding:9px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:Barlow,sans-serif;font-weight:700;font-size:11px;cursor:pointer;letter-spacing:1px;">JOIN PRIVATE</button>
      </div>
      <div id="priv-create-section">
        <label>Lobby Name</label>
        <input type="text" id="input-priv-lobby-name" placeholder="Secret Lobby..." maxlength="24"/>
        <label>Password</label>
        <input type="text" id="input-priv-password-create" placeholder="Set a password..." maxlength="20"/>
        <button class="btn btn-primary" id="btn-create-private">🔒 CREATE PRIVATE LOBBY</button>
      </div>
      <div id="priv-join-section" style="display:none">
        <label>Lobby Code</label>
        <input type="text" id="input-priv-code" placeholder="ABC123" maxlength="6" style="text-transform:uppercase"/>
        <label>Password</label>
        <input type="text" id="input-priv-password-join" placeholder="Enter password..." maxlength="20"/>
        <button class="btn btn-primary" id="btn-join-private">🔒 JOIN PRIVATE LOBBY</button>
      </div>
    </div>
    <div id="server-status" style="margin-top:12px;text-align:center;font-size:11px;color:var(--muted)">Connecting...</div>
  </div>
</div>

<!-- HUD -->
<div id="hud" style="display:none">
  <div id="hud-status">
    <div id="status-label">WAITING...</div>
    <div id="status-sub">Waiting for players</div>
  </div>
  <div id="player-list">
    <div id="player-list-title">Players</div>
    <div id="pl-entries"></div>
  </div>
  <div id="controls-hint">WASD · Move &nbsp;|&nbsp; Space · Jump &nbsp;|&nbsp; T · Chat &nbsp;|&nbsp; Close in to TAG!</div>
</div>

<button class="btn btn-secondary btn-sm" id="leave-btn" style="pointer-events:all">← Leave</button>
<div id="lobby-waiting">⏳ Waiting for another player... <span id="lobby-code-display"></span></div>
<div class="toast" id="toast"></div>

<!-- MOBILE CONTROLS -->
<div id="mobile-controls">
  <div id="joystick-zone">
    <div id="joystick-base"></div>
    <div id="joystick-thumb"></div>
  </div>
  <div id="right-buttons">
    <button class="action-btn" id="btn-chat-mobile">
      💬
      <div class="chat-unread-dot" id="mobile-unread">0</div>
    </button>
    <button class="action-btn" id="btn-jump">JUMP</button>
  </div>
</div>

<!-- CHAT PANEL -->
<div id="chat-panel" class="closed" style="display:none">
  <div id="chat-header">
    <div id="chat-header-left">
      <span>💬</span> CHAT
      <span id="chat-unread-badge">0</span>
    </div>
    <div id="chat-toggle-arrow">▲</div>
  </div>
  <div id="chat-messages"></div>
  <div id="chat-input-row">
    <input type="text" id="chat-input" placeholder="Say something... (Enter to send)" maxlength="120"/>
    <button id="chat-send">SEND</button>
  </div>
</div>
<div id="chat-key-hint">[T] Chat</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const SERVER_URL = 'https://server-production-31ca.up.railway.app';

const COLORS = ['#ff3b3b','#ff8c00','#ffd600','#4cff72','#00e5ff','#448aff','#e040fb','#ffffff','#ff6b9d','#69f0ae'];
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || ('ontouchstart' in window && window.innerWidth < 900);

let socket, scene, camera, renderer, playerMeshes = {}, myId = null;
let myLobbyId = null, myPlayer = null, allPlayers = {};
let taggerId = null, gameStarted = false;
let keys = {}, clock;
let myColor = COLORS[0];
let jumpVelocity = 0, isJumping = false;
let chatOpen = false, chatUnread = 0;

// Joystick
let joystickActive = false, joystickDx = 0, joystickDz = 0;
const JOYSTICK_RADIUS = 38;

// ======== THREE.JS ========
function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a14);
  scene.fog = new THREE.Fog(0x0a0a14, 30, 80);
  camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 200);
  camera.position.set(0, 8, 12);
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0x202030, 1.5));
  const sun = new THREE.DirectionalLight(0xfff5e0, 3);
  sun.position.set(15, 25, 10); sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.left = -40; sun.shadow.camera.right = 40;
  sun.shadow.camera.top = 40; sun.shadow.camera.bottom = -40;
  sun.shadow.camera.far = 100;
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x304060, 1);
  fill.position.set(-10, 10, -10); scene.add(fill);
  const pt = new THREE.PointLight(0xff3b3b, 2, 20);
  pt.position.y = 3; scene.add(pt);

  buildArena();
  clock = new THREE.Clock();
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

function buildArena() {
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(60,60,20,20), new THREE.MeshStandardMaterial({color:0x1a1a2e,roughness:0.95,metalness:0.05}));
  ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; scene.add(ground);
  const grid = new THREE.GridHelper(60,30,0x2a2a4a,0x1e1e35);
  grid.position.y = 0.01; scene.add(grid);
  const wm = new THREE.MeshStandardMaterial({color:0x2a2a4a,roughness:0.8,transparent:true,opacity:0.6});
  const wg = new THREE.BoxGeometry(60,3,0.5);
  [{p:[0,1.5,-30],r:0},{p:[0,1.5,30],r:0},{p:[-30,1.5,0],r:Math.PI/2},{p:[30,1.5,0],r:Math.PI/2}].forEach(({p,r})=>{
    const w = new THREE.Mesh(wg,wm); w.position.set(...p); w.rotation.y=r; w.castShadow=true; scene.add(w);
  });
  const om = new THREE.MeshStandardMaterial({color:0x3a3a5a,roughness:0.7,metalness:0.2});
  [[8,8],[-8,8],[8,-8],[-8,-8],[16,0],[-16,0],[0,16],[0,-16],[12,-14],[-12,14]].forEach(([x,z],i)=>{
    const gs=[new THREE.BoxGeometry(2,2,2),new THREE.CylinderGeometry(1,1,3,8),new THREE.BoxGeometry(3,1.5,1.5)];
    const m=new THREE.Mesh(gs[i%3],om.clone()); m.position.set(x,0.75,z); m.castShadow=true; scene.add(m);
  });
  const sv=[]; for(let i=0;i<1000;i++) sv.push((Math.random()-.5)*200,Math.random()*80+5,(Math.random()-.5)*200);
  const sg=new THREE.BufferGeometry(); sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.15})));
}

function makeCharacter(color, isTagged) {
  const g = new THREE.Group();
  const bm = getMat(color, isTagged);
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.4,1.0,8), bm);
  body.position.y=0.5; body.castShadow=true; g.add(body);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.32,12,10), getMat(color,isTagged));
  head.position.y=1.25; head.castShadow=true; g.add(head);
  const em=new THREE.MeshStandardMaterial({color:0x000000,roughness:0.5});
  [-0.12,0.12].forEach(ex=>{ const e=new THREE.Mesh(new THREE.SphereGeometry(0.06,8,8),em); e.position.set(ex,1.28,0.27); g.add(e); });
  const lm=new THREE.MeshStandardMaterial({color:0x222233,roughness:0.8});
  [-0.18,0.18].forEach(lx=>{
    const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.10,0.6,6),lm); leg.position.set(lx,-0.3,0); leg.castShadow=true; g.add(leg);
    const foot=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.1,0.3),lm); foot.position.set(lx,-0.62,0.05); g.add(foot);
  });
  [-0.6,0.6].forEach(ax=>{
    const arm=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.09,0.7,6),getMat(color,isTagged));
    arm.position.set(ax,0.55,0); arm.rotation.z=ax>0?-0.4:0.4; arm.castShadow=true; g.add(arm);
  });
  if(isTagged){
    const cm=new THREE.MeshStandardMaterial({color:0xff3b3b,emissive:0xff0000,emissiveIntensity:0.8,roughness:0.3});
    for(let i=0;i<5;i++){
      const sp=new THREE.Mesh(new THREE.ConeGeometry(0.07,0.22,5),cm);
      const a=(i/5)*Math.PI*2; sp.position.set(Math.cos(a)*0.22,1.62,Math.sin(a)*0.22); g.add(sp);
    }
    const gl=new THREE.PointLight(0xff3b3b,2,3); gl.position.y=1; g.add(gl);
  }
  return g;
}

function getMat(color, isTagged) {
  if(isTagged){
    const c=document.createElement('canvas'); c.width=64; c.height=64;
    const ctx=c.getContext('2d'); ctx.fillStyle='#777'; ctx.fillRect(0,0,64,64);
    for(let i=0;i<180;i++){ ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.6})`; ctx.beginPath(); ctx.arc(Math.random()*64,Math.random()*64,Math.random()*3+0.5,0,Math.PI*2); ctx.fill(); }
    return new THREE.MeshStandardMaterial({color:0xff0000,roughness:1.0,metalness:0.0,bumpMap:new THREE.CanvasTexture(c),bumpScale:0.08});
  }
  return new THREE.MeshStandardMaterial({color:new THREE.Color(color),roughness:0.4,metalness:0.3});
}

function spawnPlayer(id, player) {
  if(playerMeshes[id]) scene.remove(playerMeshes[id]);
  const m=makeCharacter(player.color,player.isTagged);
  m.position.set(player.x,player.y,player.z); scene.add(m); playerMeshes[id]=m;
  const cv=document.createElement('canvas'); cv.width=256; cv.height=64;
  const ctx=cv.getContext('2d'); ctx.clearRect(0,0,256,64);
  ctx.fillStyle=id===myId?'#ffd600':'white'; ctx.font='bold 26px Barlow,sans-serif'; ctx.textAlign='center'; ctx.fillText(player.name,128,40);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,depthTest:false}));
  sp.scale.set(2,0.5,1); sp.position.y=2.0; m.add(sp);
}

// ======== SOCKET ========
function initSocket(){
  socket=io(SERVER_URL,{transports:['websocket','polling']});
  socket.on('connect',()=>{ document.getElementById('server-status').innerHTML='🟢 Connected'; document.getElementById('server-status').style.color='#4cff72'; socket.emit('getLobbies'); });
  socket.on('connect_error',()=>{ document.getElementById('server-status').innerHTML='🔴 Cannot reach server'; document.getElementById('server-status').style.color='#ff3b3b'; });
  socket.on('lobbiesList',renderLobbyList);
  socket.on('joinedLobby',({lobbyId,player,lobby})=>{
    myLobbyId=lobbyId; myId=socket.id; myPlayer=player; allPlayers=lobby.players;
    showGame(); Object.values(allPlayers).forEach(p=>spawnPlayer(p.id,p)); updateHUD();
    if(Object.keys(allPlayers).length<2) showWaiting(lobbyId);
  });
  socket.on('playerJoined',(player)=>{
    allPlayers[player.id]=player; spawnPlayer(player.id,player); updateHUD();
    showToast(`${player.name} joined!`);
    document.getElementById('lobby-waiting').classList.remove('visible');
    addChatMsg(null,`${player.name} joined the lobby`,'system');
  });
  socket.on('playerLeft',({id})=>{
    if(playerMeshes[id]){scene.remove(playerMeshes[id]);delete playerMeshes[id];}
    if(allPlayers[id]){addChatMsg(null,`${allPlayers[id].name} left`,'system');delete allPlayers[id];}
    updateHUD();
  });
  socket.on('playerMoved',({id,x,y,z,rotY})=>{
    if(allPlayers[id]){allPlayers[id].x=x;allPlayers[id].y=y;allPlayers[id].z=z;allPlayers[id].rotY=rotY;}
    if(playerMeshes[id]){playerMeshes[id].position.set(x,y,z);playerMeshes[id].rotation.y=rotY;}
  });
  socket.on('gameStart',({taggerId:nt,players})=>{
    gameStarted=true;taggerId=nt;allPlayers=players;
    Object.values(allPlayers).forEach(p=>spawnPlayer(p.id,p)); updateHUD();
    const msg=taggerId===myId?"YOU'RE IT! Tag someone!":` ${allPlayers[taggerId]?.name} is IT!`;
    showToast(msg); addChatMsg(null,'🎮 Game started! '+msg,'system');
  });
  socket.on('tagged',({newTaggerId,players})=>{
    taggerId=newTaggerId;allPlayers=players;
    Object.values(allPlayers).forEach(p=>spawnPlayer(p.id,p)); updateHUD();
    if(newTaggerId===myId){flashScreen();showToast("YOU WERE TAGGED! You're IT!");}
    else showToast(`${allPlayers[newTaggerId]?.name} is now IT!`);
    myPlayer=allPlayers[myId];
    addChatMsg(null,`🏷️ ${allPlayers[newTaggerId]?.name} is now IT!`,'system');
  });
  socket.on('waitingForPlayers',()=>{gameStarted=false;showWaiting(myLobbyId);});
  socket.on('error',(msg)=>showToast('Error: '+msg));
  socket.on('chatMessage',({name,color,text,time})=>{
    addChatMsg({name,color},text,'player',time);
    if(!chatOpen){chatUnread++;updateChatBadge();}
  });
}

// ======== CHAT ========
function addChatMsg(player, text, type='player', time=null){
  const el=document.getElementById('chat-messages');
  const div=document.createElement('div');
  div.className='chat-msg'+(type==='system'?' system':'');
  const t=time?new Date(time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if(type==='system'){
    div.innerHTML=`<div class="chat-msg-body">${text} <span class="chat-msg-time">${t}</span></div>`;
  } else {
    div.innerHTML=`<div class="chat-msg-dot" style="background:${player.color}"></div><div class="chat-msg-body"><span class="chat-msg-name" style="color:${player.color}">${player.name}</span><span class="chat-msg-text">${esc(text)}</span><span class="chat-msg-time">${t}</span></div>`;
  }
  el.appendChild(div); el.scrollTop=el.scrollHeight;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function sendChat(){
  const input=document.getElementById('chat-input');
  const text=input.value.trim();
  if(!text||!myPlayer||!myLobbyId)return;
  socket.emit('chatMessage',{lobbyId:myLobbyId,text});
  input.value='';
}
function toggleChat(force){
  const panel=document.getElementById('chat-panel');
  if(force===true) chatOpen=true;
  else if(force===false) chatOpen=false;
  else chatOpen=!chatOpen;
  if(chatOpen){
    panel.classList.remove('closed'); chatUnread=0; updateChatBadge();
    setTimeout(()=>document.getElementById('chat-input').focus(),280);
  } else {
    panel.classList.add('closed'); document.getElementById('chat-input').blur();
  }
}
function updateChatBadge(){
  const b=document.getElementById('chat-unread-badge');
  const mb=document.getElementById('mobile-unread');
  if(chatUnread>0&&!chatOpen){b.textContent=chatUnread;b.classList.add('show');mb.textContent=chatUnread;mb.classList.add('show');}
  else{b.classList.remove('show');mb.classList.remove('show');}
}

// ======== JUMP ========
function triggerJump(){
  if(!isJumping&&myPlayer&&myPlayer.y<=0.52){jumpVelocity=8;isJumping=true;}
}

// ======== GAME LOOP ========
const SPEED=7, BOUNDS=28, GRAVITY=-20;

function gameLoop(){
  requestAnimationFrame(gameLoop);
  if(!gameStarted||!myPlayer){renderer.render(scene,camera);return;}
  const dt=Math.min(clock.getDelta(),0.05);
  let dx=0,dz=0;
  if(keys['w']||keys['arrowup']) dz-=1;
  if(keys['s']||keys['arrowdown']) dz+=1;
  if(keys['a']||keys['arrowleft']) dx-=1;
  if(keys['d']||keys['arrowright']) dx+=1;
  if(joystickActive){dx=joystickDx;dz=joystickDz;}
  if(dx!==0||dz!==0){
    const len=Math.sqrt(dx*dx+dz*dz); dx/=len; dz/=len;
    myPlayer.x=Math.max(-BOUNDS,Math.min(BOUNDS,myPlayer.x+dx*SPEED*dt));
    myPlayer.z=Math.max(-BOUNDS,Math.min(BOUNDS,myPlayer.z+dz*SPEED*dt));
    myPlayer.rotY=Math.atan2(dx,dz);
  }
  if(isJumping){
    jumpVelocity+=GRAVITY*dt; myPlayer.y+=jumpVelocity*dt;
    if(myPlayer.y<=0.5){myPlayer.y=0.5;jumpVelocity=0;isJumping=false;}
  }
  if(playerMeshes[myId]){
    playerMeshes[myId].position.set(myPlayer.x,myPlayer.y,myPlayer.z);
    playerMeshes[myId].rotation.y=myPlayer.rotY;
    if(dx!==0||dz!==0){
      const t=Date.now()/150;
      playerMeshes[myId].children.forEach((c,i)=>{if(c.isMesh&&(i===3||i===4))c.rotation.x=Math.sin(t+i)*0.4;});
    }
  }
  socket.emit('playerMove',{x:myPlayer.x,y:myPlayer.y,z:myPlayer.z,rotY:myPlayer.rotY});
  if(playerMeshes[myId]){
    const t=playerMeshes[myId].position;
    camera.position.x+=(t.x-camera.position.x+dx*3)*0.1;
    camera.position.z+=(t.z-camera.position.z+dz*3+10)*0.1;
    camera.position.y+=(10+myPlayer.y*0.4-camera.position.y)*0.05;
    camera.lookAt(t.x,1,t.z);
  }
  if(taggerId===myId&&myPlayer){
    Object.entries(allPlayers).forEach(([pid,p])=>{
      if(pid===myId)return;
      const d=Math.sqrt((p.x-myPlayer.x)**2+(p.z-myPlayer.z)**2);
      if(d<1.8)socket.emit('tagPlayer',{targetId:pid});
    });
  }
  if(playerMeshes[taggerId]) playerMeshes[taggerId].position.y=Math.sin(Date.now()/300)*0.08+(allPlayers[taggerId]?.y||0.5);
  renderer.render(scene,camera);
}

// ======== UI ========
function showGame(){
  document.getElementById('screen-menu').classList.add('hidden');
  document.getElementById('hud').style.display='block';
  document.getElementById('leave-btn').style.display='block';
  document.getElementById('chat-panel').style.display='flex';
  if(isMobile){ document.getElementById('mobile-controls').classList.add('visible'); }
  else { document.getElementById('chat-key-hint').style.display='block'; }
}
function showMenu(){
  document.getElementById('screen-menu').classList.remove('hidden');
  document.getElementById('hud').style.display='none';
  document.getElementById('leave-btn').style.display='none';
  document.getElementById('lobby-waiting').classList.remove('visible');
  document.getElementById('chat-panel').style.display='none';
  document.getElementById('mobile-controls').classList.remove('visible');
  document.getElementById('chat-key-hint').style.display='none';
  Object.keys(playerMeshes).forEach(id=>scene.remove(playerMeshes[id]));
  playerMeshes={};allPlayers={};myPlayer=null;gameStarted=false;taggerId=null;
  chatOpen=false;chatUnread=0;document.getElementById('chat-messages').innerHTML='';
  socket.emit('getLobbies');
}
function showWaiting(id){
  document.getElementById('lobby-waiting').classList.add('visible');
  document.getElementById('lobby-code-display').textContent='Code: '+id;
}
function updateHUD(){
  const isIt=taggerId===myId;
  const se=document.getElementById('hud-status');
  const le=document.getElementById('status-label');
  const sub=document.getElementById('status-sub');
  if(!gameStarted){se.className='';le.textContent='WAITING...';sub.textContent='Waiting for players';}
  else if(isIt){se.className='it';le.style.color='#ff3b3b';le.textContent="YOU'RE IT!";sub.textContent='Chase and tag someone!';}
  else{se.className='safe';le.style.color='#00e5ff';le.textContent='RUN!';sub.textContent=(allPlayers[taggerId]?.name||'?')+' is chasing you!';}
  const en=document.getElementById('pl-entries'); en.innerHTML='';
  Object.values(allPlayers).forEach(p=>{
    const d=document.createElement('div'); d.className='pl-entry';
    d.innerHTML=`<div class="pl-dot" style="background:${p.id===taggerId?'#ff3b3b':p.color}"></div><div class="pl-name">${p.name}${p.id===myId?' (you)':''}</div>${p.id===taggerId?'<div class="pl-it">IT</div>':''}`;
    en.appendChild(d);
  });
}
function renderLobbyList(list){
  const el=document.getElementById('lobby-list');
  if(!list||!list.length){el.innerHTML='<div class="empty-state">No lobbies. Create one!</div>';return;}
  el.innerHTML='';
  list.forEach(lobby=>{
    const div=document.createElement('div'); div.className='lobby-item';
    const pb=lobby.isPrivate?`<span class="badge badge-private">🔒</span>`:'';
    div.innerHTML=`<div><div class="lobby-item-name">${lobby.isPrivate?'🔒 ':''}${lobby.name}</div><div class="lobby-item-info">${lobby.playerCount}/6 · ${lobby.id}</div></div><div style="display:flex;flex-direction:column;gap:3px;align-items:flex-end">${pb}<span class="badge ${lobby.started?'badge-playing':'badge-waiting'}">${lobby.started?'Playing':'Waiting'}</span></div>`;
    div.onclick=()=>{
      if(lobby.isPrivate){const pw=prompt(`🔒 "${lobby.name}"\nEnter password:`);if(pw===null)return;const n=validate();if(!n)return;socket.emit('joinLobby',{lobbyId:lobby.id,playerName:n,playerColor:myColor,password:pw});}
      else doJoin(lobby.id);
    };
    el.appendChild(div);
  });
}
function flashScreen(){const el=document.getElementById('tag-flash');el.style.opacity='1';setTimeout(()=>el.style.opacity='0',300);}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000);}
function validate(){const n=document.getElementById('input-name').value.trim();if(!n){showToast('Enter your name!');return null;}return n;}
function doJoin(lobbyId){const n=validate();if(!n)return;socket.emit('joinLobby',{lobbyId,playerName:n,playerColor:myColor});}

// ======== COLOR GRID ========
function buildColorGrid(){
  const g=document.getElementById('color-grid');
  COLORS.forEach((c,i)=>{
    const sw=document.createElement('div');
    sw.className='color-swatch'+(i===0?' selected':''); sw.style.background=c;
    sw.onclick=()=>{document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));sw.classList.add('selected');myColor=c;};
    g.appendChild(sw);
  });
}

// ======== TABS ========
document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
    if(tab.dataset.tab==='browse') socket.emit('getLobbies');
  };
});
document.querySelectorAll('.priv-mode-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.priv-mode-btn').forEach(b=>{b.style.background='transparent';b.style.color='var(--muted)';});
    btn.style.background='rgba(255,59,59,0.15)';btn.style.color='var(--accent)';
    document.getElementById('priv-create-section').style.display=btn.dataset.mode==='create'?'block':'none';
    document.getElementById('priv-join-section').style.display=btn.dataset.mode==='join'?'block':'none';
  };
});

// ======== BUTTON HANDLERS ========
document.getElementById('btn-create').onclick=()=>{const n=validate();if(!n)return;const ln=document.getElementById('input-lobby-name').value.trim()||n+"'s Lobby";socket.emit('createLobby',{lobbyName:ln,playerName:n,playerColor:myColor});};
document.getElementById('btn-join-code').onclick=()=>{const n=validate();if(!n)return;const c=document.getElementById('input-lobby-code').value.trim().toUpperCase();if(!c){showToast('Enter a code!');return;}doJoin(c);};
document.getElementById('btn-refresh').onclick=()=>socket.emit('getLobbies');
document.getElementById('btn-create-private').onclick=()=>{const n=validate();if(!n)return;const ln=document.getElementById('input-priv-lobby-name').value.trim()||n+"'s Private Lobby";const pw=document.getElementById('input-priv-password-create').value.trim();if(!pw){showToast('Set a password!');return;}socket.emit('createLobby',{lobbyName:ln,playerName:n,playerColor:myColor,password:pw,isPrivate:true});};
document.getElementById('btn-join-private').onclick=()=>{const n=validate();if(!n)return;const c=document.getElementById('input-priv-code').value.trim().toUpperCase();const pw=document.getElementById('input-priv-password-join').value.trim();if(!c){showToast('Enter a code!');return;}if(!pw){showToast('Enter the password!');return;}socket.emit('joinLobby',{lobbyId:c,playerName:n,playerColor:myColor,password:pw});};
document.getElementById('leave-btn').onclick=()=>{socket.emit('leaveLobby');showMenu();};

// ======== CHAT HANDLERS ========
document.getElementById('chat-header').onclick=()=>toggleChat();
document.getElementById('chat-send').onclick=sendChat;
document.getElementById('btn-chat-mobile').addEventListener('touchstart',e=>{e.preventDefault();toggleChat();},{passive:false});
document.getElementById('chat-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'){e.preventDefault();sendChat();}
  e.stopPropagation();
});

// ======== KEYBOARD ========
window.addEventListener('keydown',e=>{
  if(document.activeElement===document.getElementById('chat-input'))return;
  const k=e.key.toLowerCase(); keys[k]=true;
  if(k==='t'){e.preventDefault();toggleChat();}
  if(k===' '){e.preventDefault();triggerJump();}
  if(k==='escape'&&chatOpen){toggleChat(false);}
});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});

// ======== JOYSTICK ========
const jz=document.getElementById('joystick-zone');
const jt=document.getElementById('joystick-thumb');
function getJoy(touch){
  const r=jz.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  let dx=touch.clientX-cx, dy=touch.clientY-cy;
  const d=Math.sqrt(dx*dx+dy*dy);
  if(d>JOYSTICK_RADIUS){dx=dx/d*JOYSTICK_RADIUS;dy=dy/d*JOYSTICK_RADIUS;}
  return{dx,dy,ndx:dx/JOYSTICK_RADIUS,ndy:dy/JOYSTICK_RADIUS};
}
jz.addEventListener('touchstart',e=>{e.preventDefault();joystickActive=true;jt.classList.add('active');const r=getJoy(e.touches[0]);joystickDx=r.ndx;joystickDz=r.ndy;jt.style.transform=`translate(calc(-50% + ${r.dx}px),calc(-50% + ${r.dy}px))`;},{passive:false});
jz.addEventListener('touchmove',e=>{e.preventDefault();const r=getJoy(e.touches[0]);joystickDx=r.ndx;joystickDz=r.ndy;jt.style.transform=`translate(calc(-50% + ${r.dx}px),calc(-50% + ${r.dy}px))`;},{passive:false});
jz.addEventListener('touchend',e=>{e.preventDefault();joystickActive=false;joystickDx=0;joystickDz=0;jt.classList.remove('active');jt.style.transform='translate(-50%,-50%)';});

// ======== JUMP BUTTON (MOBILE) ========
document.getElementById('btn-jump').addEventListener('touchstart',e=>{e.preventDefault();triggerJump();},{passive:false});

// ======== BOOT ========
buildColorGrid();
initThree();
initSocket();
gameLoop();
</script>
